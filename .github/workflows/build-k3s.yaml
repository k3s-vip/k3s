name: k3s
env:
  OEM: ${{ inputs.OEM }}
on: 
  workflow_dispatch:
   inputs:
    OEM:
      default: vip
      description: Meta
      required: true
      type: string

jobs:
  x86-64:
    name: amd64
    runs-on: ubuntu-24.04
    if: always()
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build binary
      run: |
        DOCKER_BUILDKIT=1 SKIP_IMAGE=1 SKIP_AIRGAP=1 SKIP_IMAGE=1 SKIP_VALIDATE=1 GOCOVER=1 make
        sha256sum dist/artifacts/k3s | sed 's|dist/artifacts/||' > dist/artifacts/k3s.sha256sum
    - name: "Upload binary"
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.OEM }}-amd64
        path: dist/artifacts/k3s*
  aarch64:
    name: arm64
    runs-on: ubuntu-24.04-arm
    if: always()
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build binary
      run: |
        DOCKER_BUILDKIT=1 SKIP_IMAGE=1 SKIP_AIRGAP=1 SKIP_IMAGE=1 SKIP_VALIDATE=1 GOCOVER=1 make
        sha256sum dist/artifacts/k3s-arm64 | sed 's|dist/artifacts/||' > dist/artifacts/k3s.sha256sum
    - name: "Upload binary"
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.OEM }}-arm64
        path: dist/artifacts/k3s*
